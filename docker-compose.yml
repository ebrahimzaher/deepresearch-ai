version: "3.9"

services:
  backend:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8080:8000"

    env_file:
      - .env

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"

    environment:
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env

    depends_on:
      - backend
      
    volumes:
    - ./reports:/app/reports